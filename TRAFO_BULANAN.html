<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pemeriksaan Trafo Bulanan</title>
    <style>
        /* Pengaturan Dasar Layar */
        body { font-family: Arial, sans-serif; margin: 20px; font-size: 12px; }
        
        /* Layout Header & Logo */
        .header-container {
            display: flex; align-items: center; justify-content: center;
            position: relative;
            margin-bottom: 40px; /* <--- Ini untuk memberi Jarak/Spasi ke bawah dengan info tabel */
        }
        .logo-wrapper { position: absolute; left: 0; top: 0; }
        .logo-img { max-height: 60px; max-width: 180px; object-fit: contain; }
        
        h2 { text-align: center; margin: 0; }
        
        /* Layout Tabel Informasi */
        .header-info { width: 100%; margin-bottom: 15px; }
        .header-info td { padding: 4px; border: none; }
        
        /* Layout Tabel Checklist */
        table.checklist { width: 100%; border-collapse: collapse; margin-bottom: 20px; table-layout: fixed; word-wrap: break-word;}
        table.checklist, table.checklist th, table.checklist td { border: 1px solid black; }
        table.checklist th, table.checklist td { padding: 8px; vertical-align: middle; }
        table.checklist th { background-color: #f2f2f2; text-align: center; }
        
        /* Layout Tabel Catatan (Di Luar Tabel Utama) */
        table.notes-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
        table.notes-table td { padding: 5px; vertical-align: top; border: none; }
        .notes-label { width: 15%; font-weight: bold; }
        .notes-colon { width: 2%; text-align: center; font-weight: bold; }
        .notes-input { width: 83%; }

        /* Input Dasar */
        input[type="text"], select, textarea {
            width: 100%; box-sizing: border-box; padding: 5px;
            font-family: inherit; font-size: inherit; border: 1px solid #ccc;
        }
        .file-input { margin-bottom: 5px; font-size: 11px; width: 100%; }
        
        /* Wrapper Gambar & Tombol Hapus */
        .img-wrapper { position: relative; display: inline-block; margin-top: 5px; }
        .preview-img { max-width: 140px; height: auto; display: none; border: 1px solid #ccc; }
        .btn-remove {
            position: absolute; top: -5px; right: -5px;
            background: #dc3545; color: white; border: none; border-radius: 50%;
            width: 20px; height: 20px; font-size: 12px; font-weight: bold;
            cursor: pointer; display: none; line-height: 18px; text-align: center; padding: 0;
        }
        .btn-remove:hover { background: #c82333; }

        /* Pengaturan Tanda Tangan */
        .signature-table { width: 100%; border: none; margin-top: 30px; text-align: center; }
        .signature-table td { border: none; padding: 10px; }
        .input-inline {
            border: none; border-bottom: 1px dashed #000; background: transparent;
            font-family: inherit; font-size: inherit; text-align: center; padding: 2px;
        }
        .input-inline.bold { font-weight: bold; border-bottom: 1px solid #000; width: 80%; }
        .input-inline.normal { border-bottom: none; width: 80%; }

        /* Tombol Cetak */
        .btn-print {
            position: fixed; bottom: 20px; right: 20px; padding: 15px 25px;
            background-color: #0d6efd; color: white; border: none; border-radius: 5px;
            font-size: 16px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); z-index: 1000;
        }
        .btn-print:hover { background-color: #0b5ed7; }

        /* PENGATURAN CETAK (PRINT) */
        @media print {
            body { margin: 0; }
            .no-print { display: none !important; }
            input[type="text"], select, textarea, .input-inline {
                border: none !important; background: transparent !important;
                appearance: none; -webkit-appearance: none; padding: 0; margin: 0;
                color: black; resize: none;
            }
            select { background-image: none !important; }
            ::-ms-expand { display: none; }
            table.checklist th { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            @page { size: A4; margin: 10mm; }
        }
    </style>
</head>
<body>

    <button class="btn-print no-print" onclick="window.print()">🖨️ Cetak PDF</button>

    <div class="header-container">
        <div class="logo-wrapper">
            <img src="https://telkomproperty.co.id/_next/image?url=%2F_next%2Fstatic%2Fmedia%2FlogoTelkomHeader.ff908c55.png&w=3840&q=75" class="logo-img" alt="Logo Telkom Property">
        </div>
        <h2>PEMERIKSAAN TRAFO BULANAN</h2>
    </div>

    <table class="header-info">
        <tr>
            <td width="150">TANGGAL</td>
            <td>:</td>
            <td><input type="date" value="2025-05-13" style="border:1px solid #ccc; font-family:inherit; padding:4px; width:100%;"></td>
            <td width="150">LOKASI GEDUNG</td>
            <td width="10">:</td>
            <td><input type="text" value="......."></td>
        </tr>
        <tr>
            <td>ID PERANGKAT</td>
            <td>:</td>
            <td><input type="text" value="........"></td>
            <td>KODE GEDUNG (SIMA)</td>
            <td>:</td>
            <td><input type="text" value="...."></td>
        </tr>

    </table>

    <table class="checklist">
        <thead>
            <tr>
                <th width="3%">No</th>
                <th width="22%">Item Checklist</th>
                <th width="25%">Tolok Ukur</th>
                <th width="15%">Jawaban</th>
                <th width="15%">Deskripsi</th>
                <th width="20%">Foto (Evidence)</th>
            </tr>
        </thead>
        <tbody id="checklist-body">
        </tbody>
    </table>

    <table class="notes-table">
        <tr>
            <td class="notes-label">Catatan</td>
            <td class="notes-colon">:</td>
            <td class="notes-input"><textarea rows="2" placeholder="Tuliskan catatan di sini..."></textarea></td>
        </tr>
        <tr>
            <td class="notes-label">Kesimpulan</td>
            <td class="notes-colon">:</td>
            <td class="notes-input"><textarea rows="2" placeholder="Tuliskan kesimpulan di sini..."></textarea></td>
        </tr>
        <tr>
            <td class="notes-label">Rekomendasi</td>
            <td class="notes-colon">:</td>
            <td class="notes-input"><textarea rows="2" placeholder="Tuliskan rekomendasi di sini..."></textarea></td>
        </tr>
    </table>

    <table class="signature-table">
        <tr>
            <td width="33%"></td>
            <td width="33%"></td>
            <td width="33%">
                <input type="text" class="input-inline" style="width:80px; text-align:right;" value="Lokasi">, 
                <input type="text" class="input-inline" style="width:100px;" value="DD MM 2025"><br>
                Mengetahui / menyetujui,
            </td>
        </tr>
        <tr>
            <td style="height: 60px;"></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td>
                <input type="text" class="input-inline bold" value="Nama"><br>
                <input type="text" class="input-inline normal" value="Posisi">
            </td>
            <td></td>
            <td>
                <input type="text" class="input-inline bold" value="Nama"><br>
                <input type="text" class="input-inline normal" value="Teknisi">
            </td>
        </tr>
    </table>

<script>
        // --- 1. DATA ITEM CHECKLIST ---
        const items = [
            { id: '1', name: "Trafo Daya - Level oli", type: 'radio', options:['Full', 'Tidak Full'], placeholder: 'Full' },
            { id: '2', name: "Trafo Daya - Temperatur", type: 'input', placeholder: 'Temperature ≤ 50 °C'},
            { id: '3', name: "Trafo Daya - Container", type: 'radio', options: ['Tidak Bocor', 'Bocor'] , placeholder: 'Tidak Bocor'},
            { id: '4', name: "Trafo Daya - Kondisi Silicagel", type: 'input',  placeholder: 'Warna Hijau'},
            { id: '5', name: "Visual Check Trafo - Keadaan dan Temperatur Ruang ", type: 'radio', options:['Rapi dan < 35 °C', 'Tidak Rapi dan < 35 °C'], placeholder: 'Rapi dan Temperature < 35 °C'},
            { id: '6', name: "Visual Check Trafo - Suara Dengung", type: 'radio', options:['Normal', 'Tidak Normal'] , placeholder: 'Normal (Tidak Berdenung)' },
            { id: '7', name: "Visual Check Trafo - Keadaan Kabel", type: 'input',  placeholder: 'Temperature ≤ 50 °C' },
            { id: '8', name: "Visual Check Trafo - Bau Hangus / Terbakar", type: 'radio', options:['Ada Bau Hangus','Tidak Ada Bau Hangus'] ,placeholder: 'Tidak Ada Bau' },
            { id: '9', name: "Perkabelan Instalasi Daya - Keadaan isolasi kabel", type: 'radio', options:['Tidak Lecet / Aus','Lecet / Aus'], placeholder: 'Tidak lecet / Aus' },
            { id: '10', name: "Perkabelan Instalasi Daya - Temperatur kabel daya", type: 'input',  placeholder: 'Temperature ≤ 50 °C' },
            { id: '11', name: "Perkabelan Instalasi Daya - Kerapihan kabel dan saluran ", type: 'radio', options:['Bersih. Indah. dan Rapi','Tidak Bersih. Indah. dan Rapi'] , placeholder: 'Bersih. Indah. dan Rapi' },
            { id: '12', name: "Kebersihan ruangan dan perangkat ", type: 'radio', options:['Bersih. Indah. dan Rapi','Tidak Bersih. Indah. dan Rapi'] , placeholder: 'Bersih. Indah. dan Rapi' }
        ];

        // --- 2. FUNGSI MERENDER TABEL ---
        const tbody = document.getElementById('checklist-body');
        let tableContent = '';

        items.forEach(item => {
            let jawabanInput = '';
            if (item.type === 'radio') {
                jawabanInput = `<select><option value="">- Pilih Status -</option>${item.options.map(opt => `<option value="${opt}">${opt}</option>`).join('')}</select>`;
            } else if (item.type === 'textarea') {
                jawabanInput = `<textarea rows="2" placeholder="..."></textarea>`;
            } else {
                jawabanInput = `<input type="text" placeholder="...">`;
            }

            tableContent += `
                <tr>
                    <td style="text-align: center;">${item.id}</td>
                    <td>${item.name}</td>
                    <td>${item.placeholder}</td>
                    <td>${jawabanInput}</td>
                    <td><textarea rows="2" placeholder="..."></textarea></td>
                    <td>
                        <input type="file" accept="image/*" id="input_foto${item.id}" class="file-input no-print" onchange="previewAndCompressImage(event, 'foto${item.id}')">
                        <div class="img-wrapper">
                            <img id="foto${item.id}" class="preview-img">
                            <button id="btn_foto${item.id}" class="btn-remove no-print" onclick="removeImage('foto${item.id}')">✖</button>
                        </div>
                    </td>
                </tr>
            `;
        });
        tbody.innerHTML = tableContent;

        // --- 3. FUNGSI KOMPRESI GAMBAR (Setara ~110 DPI) ---
        function compressImage(file, callback) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');

                    // Batasi resolusi maksimal 800px agar ringan namun tetap jelas saat diprint
                    const MAX_WIDTH = 800;
                    const MAX_HEIGHT = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    // Konversi ke JPEG dengan kualitas 70% (0.7)
                    const compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    callback(compressedDataUrl);
                };
            };
        }

        // --- 4. FUNGSI UPLOAD, KOMPRESI, & ANTI DUPLIKAT ---
        let uploadedFiles = new Set();

        function previewAndCompressImage(event, imageId) {
            var input = event.target;
            if (input.files && input.files[0]) {
                var file = input.files[0];
                var fileKey = file.name + "_" + file.size + "_" + file.lastModified;

                // Cek Duplikat
                if (uploadedFiles.has(fileKey)) {
                    alert("⚠️ PERINGATAN: Foto '" + file.name + "' sudah digunakan di item lain!");
                    input.value = ""; return;
                }

                // Proses Kompresi
                compressImage(file, function(compressedData) {
                    var imgElement = document.getElementById(imageId);
                    var btnElement = document.getElementById("btn_" + imageId);
                    
                    var oldKey = imgElement.getAttribute("data-filekey");
                    if (oldKey) uploadedFiles.delete(oldKey);

                    uploadedFiles.add(fileKey);
                    imgElement.setAttribute("data-filekey", fileKey);

                    // Tampilkan gambar yang sudah dikompres
                    imgElement.src = compressedData;
                    imgElement.style.display = 'block';
                    btnElement.style.display = 'block'; 
                    input.style.display = 'none'; 
                });
            }
        }

        // --- 5. FUNGSI HAPUS GAMBAR ---
        function removeImage(imageId) {
            var imgElement = document.getElementById(imageId);
            var btnElement = document.getElementById("btn_" + imageId);
            var inputElement = document.getElementById("input_" + imageId);

            var fileKey = imgElement.getAttribute("data-filekey");
            if (fileKey) {
                uploadedFiles.delete(fileKey);
                imgElement.removeAttribute("data-filekey");
            }

            imgElement.src = ""; imgElement.style.display = 'none'; btnElement.style.display = 'none'; 
            inputElement.value = ""; inputElement.style.display = 'block'; 
        }
    </script>
</body>

</html>
