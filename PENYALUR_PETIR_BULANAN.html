<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Penyalur Petir Bulanan</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <button class="btn-print no-print" onclick="validateAndPrint()">🖨️ Cetak PDF</button>
    <button class="btn-reset no-print" onclick="resetForm()">🔄 Mulai Baru</button>
    <button class="btn-export no-print" onclick="exportSession()">💾 Simpan Sesi (Export)</button>
    <button class="btn-import no-print" onclick="document.getElementById('importFile').click()">📂 Lanjut Sesi (Import)</button>
    <input type="file" id="importFile" accept=".json" style="display: none;" class="no-print" onchange="importSession(event)">

    <div class="header-container">
        <div class="logo-wrapper">
            <img src="https://telkomproperty.co.id/_next/image?url=%2F_next%2Fstatic%2Fmedia%2FlogoTelkomHeader.ff908c55.png&w=3840&q=75" class="logo-img" alt="Logo Telkom Property">
        </div>
        <h2>PENYALUR PETIR BULANAN</h2>
    </div>

    <table class="header-info">
        <tr>
            <td width="150">TANGGAL</td><td>:</td>
            <td><input type="date" value="2025-05-13" class="save-target"></td>
            <td width="150">LOKASI GEDUNG</td><td width="10">:</td>
            <td><input type="text" value="......." class="save-target"></td>
        </tr>
        <tr>
            <td>ID PERANGKAT</td><td>:</td>
            <td><input type="text" value="........" class="save-target"></td>
            <td>KODE GEDUNG (SIMA)</td><td>:</td>
            <td><input type="text" value="...." class="save-target"></td>
        </tr>
    </table>

    <table class="checklist">
        <thead>
            <tr>
                <th width="3%">No</th><th width="22%">Item Checklist</th><th width="25%">Tolak Ukur</th>
                <th width="15%">Jawaban</th><th width="15%">Deskripsi</th><th width="20%">Foto (Evidence)</th>
            </tr>
        </thead>
        <tbody id="checklist-body"></tbody>
    </table>

    <table class="notes-table">
        <tr><td class="notes-label">Catatan</td><td class="notes-colon">:</td><td class="notes-input"><textarea rows="2" placeholder="Tuliskan catatan di sini..." class="save-target"></textarea></td></tr>
        <tr><td class="notes-label">Kesimpulan</td><td class="notes-colon">:</td><td class="notes-input"><textarea rows="2" placeholder="Tuliskan kesimpulan di sini..." class="save-target"></textarea></td></tr>
        <tr><td class="notes-label">Rekomendasi</td><td class="notes-colon">:</td><td class="notes-input"><textarea rows="2" placeholder="Tuliskan rekomendasi di sini..." class="save-target"></textarea></td></tr>
    </table>

    <table class="signature-table">
        <tr>
            <td width="33%"></td><td width="33%"></td>
            <td width="33%">
                <input type="text" class="input-inline save-target" style="width:80px; text-align:right;" value="Lokasi">, 
                <input type="text" class="input-inline save-target" style="width:100px;" value="DD MM 2025"><br>Mengetahui / menyetujui,
            </td>
        </tr>
        <tr><td style="height: 60px;"></td><td></td><td></td></tr>
        <tr>
            <td><input type="text" class="input-inline bold save-target" value="Nama"><br><input type="text" class="input-inline normal save-target" value="Posisi"></td>
            <td></td>
            <td><input type="text" class="input-inline bold save-target" value="Nama"><br><input type="text" class="input-inline normal save-target" value="Teknisi"></td>
        </tr>
    </table>

    <script>
        const checklistItems = [
            { id: '1', name: "Kondisi Fisik Air Finial - Roof Top", type: 'radio', options:['Kotor', 'Bersih'], placeholder: 'Besih' },
            { id: '2', name: "Kondisi Fisik Air Finial - Besi tiang ground di sisi kanan depan gedung", type: 'radio', options: ['Runcing', 'Tumpul'] ,placeholder: 'Runcing'},
            { id: '3', name: "Kondisi Fisik Air Finial - Besi tiang ground di sisi kiri depan gedung", type: 'radio', options: ['Runcing', 'Tumpul'] , placeholder: 'Runcing'},
            { id: '4', name: "Kondisi Fisik Air Finial - Besi tiang ground di sisi kanan belakang gedung", type: 'radio', options: ['Runcing', 'Tumpul'] , placeholder: 'Runcing'},
            { id: '5', name: "Kondisi Fisik Air Finial - Besi tiang ground di sisi kiri belakang gedung", type: 'radio', options: ['Runcing', 'Tumpul'] , placeholder: 'Runcing'},
            { id: '6', name: "Fisik Sambungan - Air finial dengan saluran", type: 'radio', options:['Tidak Bersih & Tidak Kencang', 'Bersih & Kencang (Tidak Berkarat & Tidak Berjamur)'], placeholder: 'Bersih & Kencang (Tidak berkarat/berjamur)' },
            { id: '7', name: "Fisik Sambungan - Saluran dengan terminal", type: 'radio', options:['Tidak Bersih & Tidak Kencang', 'Bersih & Kencang (Tidak Berkarat & Tidak Berjamur)'], placeholder: 'Bersih & Kencang (Tidak berkarat/berjamur)' },
            { id: '8', name: "Fisik Isolator", type: 'radio', options:['Tidak Baik','Baik Tidak Pecah'] ,placeholder: 'Baik & Tidak Pecah' },
            { id: '9', name: "Fisik terminal ground perangkat tiap lantai", type: 'radio', options:['Bersih','Kotor'], placeholder: 'Bersih. Kencang. baik & tidak berkarat/berjamur' },
            { id: '10', name: "Fisik terminal Bak Grounding", type: 'radio', options:['Bersih','Kotor'], placeholder: 'Bersih. Kencang. baik & tidak berkarat/berjamur' },
            { id: '11', name: "Tahanan pentanahan - Penangkal petir Gedung ", type: 'input',  placeholder: '< 5 Ohm' },
            { id: '12', name: "Tahanan pentanahan - Grounding ", type: 'input',  placeholder: '< 5 Ohm' },
            { id: '13', name: "Catatan Kesimpulan", type: 'textarea', placeholder: 'Tuliskan Kesimpulan' },
            { id: '14', name: "Catatan Rekomendasi", type: 'textarea', placeholder: 'Tuliskan Rekomendasi' }
        ];
    </script>
    <script src="script.js"></script>
</body>
</html>
