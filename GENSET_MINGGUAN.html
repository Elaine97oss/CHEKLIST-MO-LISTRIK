<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pemeriksaan Form ...</title> 
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <button class="btn-print no-print" onclick="validateAndPrint()">🖨️ Cetak PDF</button>
    <button class="btn-reset no-print" onclick="resetForm()">🔄 Mulai Baru</button>
    <button class="btn-export no-print" onclick="exportSession()">💾 Simpan Sesi (Export)</button>
    <button class="btn-import no-print" onclick="document.getElementById('importFile').click()">📂 Lanjut Sesi (Import)</button>
    <input type="file" id="importFile" accept=".json" style="display: none;" class="no-print" onchange="importSession(event)">

    <div class="header-container">
        <div class="logo-wrapper">
            <img src="https://telkomproperty.co.id/_next/image?url=%2F_next%2Fstatic%2Fmedia%2FlogoTelkomHeader.ff908c55.png&w=3840&q=75" class="logo-img" alt="Logo Telkom Property">
        </div>
        <h2>PEMERIKSAAN ...</h2>
    </div>

    <table class="header-info">
        <tr>
            <td width="150">TANGGAL</td><td>:</td>
            <td><input type="date" value="2025-05-13" class="save-target"></td>
            <td width="150">LOKASI GEDUNG</td><td width="10">:</td>
            <td><input type="text" value="......." class="save-target"></td>
        </tr>
        <tr>
            <td>ID PERANGKAT</td><td>:</td>
            <td><input type="text" value="........" class="save-target"></td>
            <td>KODE GEDUNG (SIMA)</td><td>:</td>
            <td><input type="text" value="...." class="save-target"></td>
        </tr>
    </table>

    <table class="checklist">
        <thead>
            <tr>
                <th width="3%">No</th><th width="22%">Item Checklist</th><th width="25%">Tolok Ukur</th>
                <th width="15%">Jawaban</th><th width="15%">Deskripsi</th><th width="20%">Foto (Evidence)</th>
            </tr>
        </thead>
        <tbody id="checklist-body"></tbody>
    </table>

    <table class="notes-table">
        <tr><td class="notes-label">Catatan</td><td class="notes-colon">:</td><td class="notes-input"><textarea rows="2" placeholder="Tuliskan catatan di sini..." class="save-target"></textarea></td></tr>
        <tr><td class="notes-label">Kesimpulan</td><td class="notes-colon">:</td><td class="notes-input"><textarea rows="2" placeholder="Tuliskan kesimpulan di sini..." class="save-target"></textarea></td></tr>
        <tr><td class="notes-label">Rekomendasi</td><td class="notes-colon">:</td><td class="notes-input"><textarea rows="2" placeholder="Tuliskan rekomendasi di sini..." class="save-target"></textarea></td></tr>
    </table>

    <table class="signature-table">
        <tr>
            <td width="33%"></td><td width="33%"></td>
            <td width="33%">
                <input type="text" class="input-inline save-target" style="width:80px; text-align:right;" value="Lokasi">, 
                <input type="text" class="input-inline save-target" style="width:100px;" value="DD MM 2025"><br>Mengetahui / menyetujui,
            </td>
        </tr>
        <tr><td style="height: 60px;"></td><td></td><td></td></tr>
        <tr>
            <td><input type="text" class="input-inline bold save-target" value="Nama"><br><input type="text" class="input-inline normal save-target" value="Posisi"></td>
            <td></td>
            <td><input type="text" class="input-inline bold save-target" value="Nama"><br><input type="text" class="input-inline normal save-target" value="Teknisi"></td>
        </tr>
    </table>

    <script>
       
        const checklistItems = [
            { id: '1', name: "Pemeriksaan Genset", type: 'radio', options:['Normal','Tidak Normal'], placeholder: 'Genset bersih; Level oli dalam batas MIN - MAX; Kekencangan & kondisi tali kipas normal' },
            { id: '2', name: "Pemeriksaan batere starter", type: 'radio', options:['Kencang', 'Tidak Kencang'], placeholder: 'Mur/baut pole Batt kencang; Level Elekt Batt dalam batas MIN - MAX; Voltage Batt > 12 - 13 Vdc atau V Batt > 24 -25 Vdc' },
            { id: '3', name: "Pemeriksaan tangki BBM", type: 'radio', options:['Ada', 'Tidak Ada'], placeholder: 'Tidak ada indikasi kebocoran; Pompa BBM berfungsi normal' },
            { id: '4', name: "Pemeriksaan level BBM (Tangki Harian)", type: 'input', placeholder: 'Tangki Harian...........(LITER)' },
            { id: '5', name: "Pemeriksaan level BBM (Tangki Bulanan)", type: 'input', placeholder: 'Tangki Bulanan...........(LITER)' },
            { id: '6', name: "Pemeriksaan Panel ATS-AMF", type: 'radio',options:['Ada', 'Tidak Ada'], placeholder: 'Tidak ada indikasi alarm/anomali' },
            { id: '7', name: "Pencatatan jam operasi genset", type: 'input', placeholder: 'Mencatat' },
            { id: '8', name: "Heater", type: 'input', placeholder: '±40 °C' },
            { id: '9', name: "Running test (± 15 M) : Test manual start/stop", type: 'radio', options: ['Berfungsi', 'Tidak Berfungsi'] ,placeholder: 'Berfungsi'},
            { id: '10', name: "Running test (± 15 M) : Test auto start/stop", type: 'radio', options: ['Berfungsi', 'Tidak Berfungsi'] , placeholder: 'Berfungsi'},
            { id: '11', name: "Running test (± 15 M) : Tegangan output", type: 'input', placeholder: '220/380 Volt ac ± 5%' },
            { id: '12', name: "Running test (± 15 M) : Tekanan oli", type: 'input', placeholder: '>2.5 Psi' },
            { id: '13', name: "Running test (± 15 M) : Arus beban", type: 'radio', options:['Yes', 'No'], placeholder: 'R, S, T' },
            { id: '14', name: "Running test (± 15 M) : Warna gas buang", type: 'radio', options:['Putih', 'Tidak Putih'], placeholder: 'Berwarna Putih' },
            { id: '15', name: "Running test (± 15 M) : Suara mesin", type: 'radio', options:['Kasar','Halus'] ,placeholder: 'Rata/halus 101.5 dIB' },
            { id: '16', name: "Temperatur air", type: 'input', placeholder: '< 90 °C' },
            { id: '17', name: "Temperatur Koneksi Kabel Output panel genset", type: 'input', placeholder: '< 70 derajat' },
            { id: '18', name: "Catatan Kesimpulan", type: 'textarea', placeholder: 'Tuliskan Kesimpulan' },
            { id: '19', name: "Catatan Rekomendasi", type: 'textarea', placeholder: 'Tuliskan Rekomendasi' }
        ];
    </script>
    <script src="script.js"></script>
</body>
</html>
